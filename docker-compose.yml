name: student-affairs-assistant

services:
  api:
    build: ./api
    volumes:
      - ./api/chroma_db:/app/chroma_db
      - ./api:/app 
    command: sh -c "python ingest.py && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    expose:
      - "8000"

  ui:
    build: ./ui
    volumes:
      - ./ui:/app
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
